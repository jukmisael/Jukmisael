name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  classic-overview:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-main.svg
          template: classic
          base: header, repositories

  language-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-languages.svg
          base: "" 
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes

  # Job 3: Favoritos - Anime
  anilist-anime:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: anilist-anime.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: jukmisael
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites
          plugin_anilist_limit: 3

  # Job 4: Favoritos - Manga
  anilist-manga:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: anilist-manga.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: jukmisael
          plugin_anilist_medias: manga
          plugin_anilist_sections: favorites
          plugin_anilist_limit: 3

  # Job 5: Personagens Favoritos
  anilist-characters:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: anilist-characters.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: jukmisael
          plugin_anilist_sections: characters
          plugin_anilist_limit: 3
